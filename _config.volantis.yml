############################### Sidebar ############################### > start
sidebar:
  position: right # left right
  # 主页、分类、归档等独立页面
  for_page: [blogger, category, tagcloud, donate, text]
  # layout: docs/post 这类文章页面
  for_post: [toc]
  # 侧边栏组件库
  widget_library:
    # ---------------------------------------
    # blogger info widget
    blogger:
      class: blogger
      display: [desktop, mobile] # [desktop, mobile]
      avatar: https://cdn.jsdelivr.net/gh/charlesyifanli/image/local/lanyangyang.jpg # https://gcore.jsdelivr.net/gh/volantis-x/cdn-org/blog/Logo-NavBar@3x.png
      shape: rectangle # circle, rectangle
      url: /about/
      title: 'Work hard'
      subtitle: 'When you are rushing towards the future in a hurry, it means you no longer enjoy the present.'
      jinrishici: False # Poetry Today. You can set a string, and it will be displayed when loading fails.
      social:
        - icon: fa-solid fa-envelope
          url: mailto:goodlucktocharles@outlook.com
        - icon: fab fa-github
          url: https://github.com/charlesyifanli
        - icon: fa-solid fa-headphones-alt
          url: /
    # ---------------------------------------
    # toc widget (valid only in articles)
    toc:
      class: toc
      display: [desktop, mobile] # [desktop, mobile]
      sticky: true
      header:
        icon: fa-solid fa-list
        title: 本文目录
      list_number: false
      min_depth: 2
      max_depth: 5
    # ---------------------------------------
    # music
    music:
      class: music
      display: [desktop, mobile] # [desktop, mobile]
      pjaxReload: false
    # ---------------------------------------
    # category widget
    category:
      class: category
      display: [desktop, mobile] # [desktop, mobile]
      header:
        icon: fa-solid fa-folder-open
        title: Article Classification
        url: /blog/categories/
    # ---------------------------------------
    # tagcloud widget
    tagcloud:
      class: tagcloud
      display: [desktop, mobile] # [desktop, mobile]
      header:
        icon: fa-solid fa-tags
        title: Popular Tags
        url: /blog/tags/
      min_font: 14
      max_font: 24
      color: true
      start_color: '#999'
      end_color: '#555'
    # ---------------------------------------
    # qrcode widget
    qrcode:
      class: qrcode
      display: [desktop, mobile] # [desktop, mobile]
      height: 64px  # Automatic height if not set
      images:
        - volantis-static/media/org.volantis/blog/qrcode/github@volantis.png # https://gcore.jsdelivr.net/gh/volantis-x/cdn-org/blog/qrcode/github@volantis.png
        - volantis-static/media/org.volantis/blog/qrcode/github@volantis.png # https://gcore.jsdelivr.net/gh/volantis-x/cdn-org/blog/qrcode/github@volantis.png
    # ---------------------------------------
    # webinfo widget
    webinfo:
      class: webinfo
      display: [desktop]
      header:
        icon: fa-solid fa-award
        title: web info
      type:
        article:
          enable: true
          text: 'Number of Articles: '
          unit: 'Pieces'
        runtime:
          enable: false
          data: '2024/01/17'    # 填写建站日期
          text: 'Elapsed Time: '
          unit: 'Days'
        # wordcount:
        #   enable: false
        #   text: '本站总字数：'   # 需要启用 wordcount
        #   unit: '字'
        # visitcounter:
        #   enable: true
        #   siteuv:
        #     text: '本站访客数：'
        #     unit: '人'
        #   sitepv:
        #     text: '本站总访问量：'
        #     unit: '次'
        # lastupd:
        #   enable: true
        #   friendlyShow: true    # 更友好的时间显示
        #   text: '最后活动时间：'
        #   unit: '日'
    # ---------------------------------------
    # lastupdate widget
    lastupdate:
      class: lastupdate
      display: [desktop, mobile]
      header:
        icon: fa-solid fa-clock WISTERIA
        title: Recent Updates
    text:
      class: text
      display: [desktop, mobile] # [desktop, mobile]
      header:
        icon: fab fa-github
        title: Click me
        url: https://github.com/charlesyifanli
############################### Sidebar ############################### > end




